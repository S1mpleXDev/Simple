<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Work</title>
    <style>
        /* Loading screen styles */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-text {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 2em;
            font-weight: bold;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        .error-message {
            color: red;
            font-size: 1.2em;
            text-align: center;
            margin-top: 20px;
        }

        /* Main site styles (hidden initially) */
        body {
            display: none; /* Hidden until loading completes */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        body.loaded {
            display: flex; /* Show when loaded */
        }
        h1 {
            font-weight: 900; /* Makes the text thick/bold */
            font-size: 2.5em;
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div>
            <div class="loading-text">Loading Assets...</div>
            <div id="error-message" class="error-message" style="display: none;">Connection timeout. Please check your network and refresh.</div>
        </div>
    </div>

    <!-- Main Content -->
    <h1>Under Work</h1>

    <!-- Chatway Script (loaded after main content is ready) -->
    <script id="chatway" async="true" src="https://cdn.chatway.app/widget.js?id=bhwGBABQCnDe"></script>

    <!-- Loading Logic Script -->
    <script>
        (function() {
            const loadingScreen = document.getElementById('loading-screen');
            const errorMessage = document.getElementById('error-message');
            const body = document.body;
            let timeoutId;

            // Function to hide loading and show main content
            function completeLoading() {
                clearTimeout(timeoutId);
                loadingScreen.classList.add('hidden');
                setTimeout(() => {
                    loadingScreen.style.display = 'none'; // Fully remove after fade
                }, 500);
                body.classList.add('loaded');
            }

            // Function to show error
            function showError() {
                errorMessage.style.display = 'block';
                const loadingText = document.querySelector('.loading-text');
                loadingText.textContent = 'Loading Failed';
            }

            // Set timeout for 5 seconds
            timeoutId = setTimeout(() => {
                showError();
            }, 5000);

            // Check if main content is ready (DOM loaded)
            if (document.readyState === 'complete') {
                // If external scripts like Chatway are slow, wait a bit more or check onload
                const script = document.getElementById('chatway');
                if (script.complete || script.readyState === 'complete') {
                    completeLoading();
                } else {
                    script.onload = completeLoading;
                    script.onerror = () => {
                        showError();
                        setTimeout(completeLoading, 1000); // Still show site after error
                    };
                }
            } else {
                // Wait for DOM to load
                window.addEventListener('load', () => {
                    const script = document.getElementById('chatway');
                    if (script.complete || script.readyState === 'complete') {
                        completeLoading();
                    } else {
                        script.onload = completeLoading;
                        script.onerror = () => {
                            showError();
                            setTimeout(completeLoading, 1000);
                        };
                    }
                });
            }
        })();
    </script>
</body>
</html>
